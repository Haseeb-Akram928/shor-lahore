name: ShorLahore Continuous Integration

# Trigger this workflow on pushes or pull requests to the main branch
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify:
    name: Build, Lint, and Test
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # Step 1: Download the source code from GitHub onto the container
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Install Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json
            client/package-lock.json

      # Step 3: Install root and backend dependencies
      - name: Install Root Dependencies
        run: npm ci

      - name: Install Backend Dependencies
        run: npm ci --prefix server

      - name: Install Frontend Dependencies
        run: npm ci --prefix client

      # Step 4: Run backend linters & syntax checks
      - name: Lint Backend
        run: npm run lint --prefix server || true

      # Step 5: Verify backend builds without TS errors
      - name: Build Backend
        run: npm run build --prefix server

      # Step 6: Run Backend Test Suite
      - name: Run Backend Tests
        run: npm run test --prefix server
        env:
          JWT_SECRET: testing-secret-key-at-least-32-characters-long
          MONGODB_URI: mongodb://127.0.0.1:27017/shorlahore_test

      # Step 7: Verify frontend builds without TS/Next.js errors
      - name: Lint Frontend
        run: npm run lint --prefix client

      - name: Build Frontend
        run: npm run build --prefix client
